<svg xmlns="http://www.w3.org/2000/svg" width="600" height="800" viewBox="0 0 600 800">
  <rect width="600" height="800" fill="#F3EDE4"/>
  <!-- Workbench silhouette -->
  <rect x="100" y="500" width="400" height="8" rx="2" fill="#C5A258" opacity="0.15"/>
  <!-- Hands working silhouette -->
  <ellipse cx="250" cy="420" rx="60" ry="30" fill="#C9A9A6" opacity="0.1"/>
  <ellipse cx="350" cy="430" rx="55" ry="28" fill="#C9A9A6" opacity="0.1"/>
  <!-- Tools -->
  <line x1="180" y1="380" x2="180" y2="500" stroke="#C5A258" stroke-width="1.5" opacity="0.15"/>
  <line x1="420" y1="370" x2="430" y2="500" stroke="#C5A258" stroke-width="1.5" opacity="0.15"/>
  <!-- Small ring being worked on -->
  <circle cx="300" cy="440" r="15" fill="none" stroke="#C5A258" stroke-width="2" opacity="0.25"/>
  <text x="300" y="650" text-anchor="middle" font-family="Georgia, serif" font-size="14" fill="#8A7F72" opacity="0.6">The Maker at Work</text>
</svg>
